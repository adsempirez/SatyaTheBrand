<title>Satya The Brand</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0f2a;
    color:white;
    overflow:hidden;
}

/* GRID BACKGROUND */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image: linear-gradient(#1a1f4d 1px, transparent 1px),
                      linear-gradient(90deg,#1a1f4d 1px, transparent 1px);
    background-size:40px 40px;
    opacity:0.2;
}

/* CONTAINER */
.container{
    text-align:center;
    z-index:2;
}

/* LOGO FLOAT */
.logo{
    width:110px;
    border-radius:20px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

/* 🔥 NEW SUBSCRIBER TEXT */
.sub-count{
    margin-top:10px;
    font-size:14px;
    font-weight:bold;
    color:#a855f7;
    letter-spacing:1px;
    text-shadow:0 0 10px #a855f7;
}

/* SUBTITLE */
.subtitle{
    font-size:12px;
    opacity:0.6;
    letter-spacing:2px;
    margin-top:10px;
}

/* TITLE */
.title{
    font-size:48px;
    margin-top:10px;
    line-height:1.2;
}

.satya{
    display:inline-block;
    font-weight:bold;
    letter-spacing:2px;
    animation: slideLeft 1s ease forwards;
}

.brand{
    display:inline-block;
    color:#a855f7;
    font-weight:bold;
    letter-spacing:3px;
    animation: slideRight 1s ease forwards, glowText 1.5s infinite alternate;
}

/* TITLE ANIMATION */
@keyframes slideLeft{
    from{transform:translateX(-200px); opacity:0;}
    to{transform:translateX(0); opacity:1;}
}

@keyframes slideRight{
    from{transform:translateX(200px); opacity:0;}
    to{transform:translateX(0); opacity:1;}
}

@keyframes glowText{
    from{text-shadow:0 0 5px #a855f7;}
    to{text-shadow:0 0 20px #a855f7;}
}

/* TAGS */
.tags span{
    margin:10px;
    display:inline-block;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow{
    from{opacity:0.5;}
    to{opacity:1; color:#a855f7;}
}

/* STATS */
.stats{
    margin-top:20px;
    width:250px;
    margin-left:auto;
    margin-right:auto;
}

.bar{
    margin:12px 0;
    text-align:left;
    font-size:12px;
}

.progress{
    background:#222;
    height:6px;
    border-radius:10px;
    overflow:hidden;
}

.progress div{
    height:6px;
    background:#a855f7;
    border-radius:10px;
    animation: load 2s ease;
}

@keyframes load{
    from{width:0;}
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 30px;
    background:linear-gradient(45deg,#a855f7,#7c3aed);
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    animation: pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* RIPPLE EFFECT */
.btn:active{
    transform:scale(0.95);
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="WhatsApp Image 2026-04-28 at 21.41.53.jpeg" class="logo">

    <!-- 🔥 SUBSCRIBER COUNT -->
    <div class="sub-count">
        <span id="counter">0</span>K+ Subscribers
    </div>

    <!-- SUBTITLE -->
    <p class="subtitle">TELEGRAM CRICKET ANALYSIS CHANNEL</p>

    <!-- TITLE -->
    <h1 class="title">
        <span class="satya">SATYA</span><br>
        <span class="brand">THE BRAND</span>
    </h1>

    <!-- TAGS -->
    <div class="tags">
        <span>IPL</span>
        <span>T20</span>
        <span>LIVE ALERTS</span>
    </div>

    <!-- STATS -->
    <div class="stats">

        <div class="bar">
            TOSS 93%
            <div class="progress"><div style="width:93%"></div></div>
        </div>

        <div class="bar">
            IPL 88%
            <div class="progress"><div style="width:88%"></div></div>
        </div>

        <div class="bar">
            T20 85%
            <div class="progress"><div style="width:85%"></div></div>
        </div>

    </div>

    <!-- BUTTON -->
    <a href="https://t.me/+XSl-CK2Z8GRkMjI1" class="btn">
        JOIN FREE ON TELEGRAM
    </a>

</div>

<script>
/* 🔥 COUNTER ANIMATION */
let count = 0;
let target = 100;
let speed = 20;

let counter = document.getElementById("counter");

let update = setInterval(()=>{
    count++;
    counter.innerText = count;
    if(count >= target){
        clearInterval(update);
    }
}, speed);
</script>

</body>
